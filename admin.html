<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cochirosso · Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rojo:#9b1c1c;
  --rojo-t:rgba(155,28,28,0.12);
  --rojo-btn:rgba(155,28,28,0.9);
  --crema:#fdf6ef;
  --text:#1a1a1a;
  --muted:#666;
  --radius:12px;
}
body{background:var(--crema);color:var(--text);font-family:'Nunito',sans-serif;min-height:100dvh}

/* LOGIN */
#login-screen{position:fixed;inset:0;background:var(--crema);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.5rem;z-index:100}
#login-screen img{width:80px;height:80px;border-radius:50%}
#login-screen h1{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;color:var(--rojo);letter-spacing:0.04em}
#login-screen p{color:var(--muted);font-size:14px}
#login-box{display:flex;flex-direction:column;gap:10px;width:100%;max-width:300px}
#clave-input{border:2px solid rgba(155,28,28,0.3);border-radius:10px;padding:0.65rem 1rem;font-family:'Nunito',sans-serif;font-size:15px;text-align:center;outline:none;letter-spacing:0.1em;background:#fff}
#clave-input:focus{border-color:var(--rojo)}
#login-btn{background:var(--rojo-btn);color:#fff;border:none;border-radius:10px;padding:0.65rem;font-family:'Nunito',sans-serif;font-weight:700;font-size:15px;cursor:pointer;transition:opacity .2s}
#login-btn:hover{opacity:0.88}
#login-error{color:var(--rojo);font-size:13px;text-align:center;min-height:16px}

/* ADMIN */
#admin-screen{display:none;padding:0 0 2rem}
header{background:#fff;border-bottom:2px solid var(--rojo-t);padding:1rem 1.5rem;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
header img{width:42px;height:42px;border-radius:50%}
.brand h1{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--rojo)}
.brand p{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.06em}
.header-right{margin-left:auto;display:flex;gap:8px;align-items:center}
#badge-nuevos{background:var(--rojo-btn);color:#fff;border-radius:20px;padding:3px 10px;font-size:12px;font-weight:700;display:none}
#btn-refrescar{background:var(--rojo-t);color:var(--rojo);border:1.5px solid var(--rojo-btn);border-radius:8px;padding:5px 12px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
#btn-salir{background:transparent;color:var(--muted);border:1px solid #ddd;border-radius:8px;padding:5px 10px;font-family:'Nunito',sans-serif;font-size:12px;cursor:pointer}

.filtros{padding:1rem 1.5rem 0.5rem;display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filtros span{font-size:13px;color:var(--muted);font-weight:600}
.filtro-btn{background:var(--rojo-t);color:var(--rojo);border:1.5px solid rgba(155,28,28,0.3);border-radius:20px;padding:5px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:all .15s}
.filtro-btn.activo,.filtro-btn:hover{background:var(--rojo-btn);color:#fff;border-color:var(--rojo-btn)}

#lista{padding:1rem 1.5rem;display:grid;gap:14px}

.pedido-card{background:#fff;border-radius:var(--radius);border:1.5px solid rgba(155,28,28,0.15);padding:1.1rem 1.2rem;position:relative;transition:box-shadow .2s}
.pedido-card.nuevo{border-color:var(--rojo-btn);box-shadow:0 0 0 2px rgba(155,28,28,0.15)}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.pedido-id{font-family:'Bebas Neue',sans-serif;font-size:1.2rem;color:var(--rojo)}
.pedido-fecha{font-size:11px;color:var(--muted)}
.estado-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.05em}
.estado-nuevo{background:#fef2f2;color:var(--rojo);border:1px solid rgba(155,28,28,0.3)}
.estado-preparando{background:#fff7ed;color:#c2410c;border:1px solid rgba(194,65,12,0.3)}
.estado-listo{background:#f0fdf4;color:#15803d;border:1px solid rgba(21,128,61,0.3)}
.estado-entregado{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}

.items-list{margin:8px 0;font-size:13.5px;line-height:1.8}
.items-list li{list-style:none;padding:2px 0;border-bottom:1px dashed rgba(155,28,28,0.1)}
.items-list li:last-child{border-bottom:none}

.totales{display:flex;gap:1rem;margin-top:8px;font-size:13px;color:var(--muted);flex-wrap:wrap}
.totales strong{color:var(--text)}

.acciones{margin-top:10px;display:flex;gap:8px;flex-wrap:wrap}
.accion-btn{border:none;border-radius:8px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:opacity .2s}
.accion-btn:hover{opacity:0.8}
.btn-preparando{background:#fff7ed;color:#c2410c}
.btn-listo{background:#f0fdf4;color:#15803d}
.btn-entregado{background:#f1f5f9;color:#475569}
.btn-eliminar{background:#fef2f2;color:var(--rojo)}

#vacio{text-align:center;padding:3rem 1rem;color:var(--muted);font-size:14px}
#vacio span{display:block;font-size:2rem;margin-bottom:8px}

.notif{position:fixed;bottom:20px;right:20px;background:var(--rojo-btn);color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;font-weight:700;z-index:999;animation:slideup .3s ease;display:none}
@keyframes slideup{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>

  apiKey: "AIzaSyBQ3sJQv0-7kVin1Db6PHQxz6uqnSnCU3c",
  authDomain: "cochirosso.firebaseapp.com",
  projectId: "cochirosso",
  storageBucket: "cochirosso.firebasestorage.app",
  messagingSenderId: "656842784542",
  appId: "1:656842784542:web:489d8d409bfb5e9fa0530f"
};

let db = null;
const firebaseListo = !firebaseConfig.apiKey.startsWith('PEGA_AQUI');
if(firebaseListo && window.firebase){
  try {
    firebase.initializeApp(firebaseConfig);
    db = firebase.firestore();
  } catch(e){ console.error('Firebase no se pudo iniciar:', e); }
}
// ================================================

const CLAVE = 'Colegioingles12=';
let filtroActual = 'todos';
let pedidosCache = [];
let unsubscribe = null;
let intervaloLocal = null;

// LOGIN
document.getElementById('login-btn').onclick = () => {
  const val = document.getElementById('clave-input').value;
  if(val === CLAVE){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    iniciarPedidos();
  } else {
    document.getElementById('login-error').textContent = 'Clave incorrecta. Intenta de nuevo.';
    document.getElementById('clave-input').value = '';
  }
};
document.getElementById('clave-input').addEventListener('keydown', e => {
  if(e.key === 'Enter') document.getElementById('login-btn').click();
});

function cerrarSesion(){
  if(unsubscribe) unsubscribe();
  if(intervaloLocal) clearInterval(intervaloLocal);
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('clave-input').value = '';
  document.getElementById('login-error').textContent = '';
}

function mostrarNotif(txt){
  const n = document.getElementById('notif');
  n.textContent = txt;
  n.style.display = 'block';
  setTimeout(() => n.style.display = 'none', 2500);
}

function iniciarPedidos(){
  if(db){
    // Modo nube: escucha en tiempo real
    unsubscribe = db.collection('pedidos').orderBy('id','desc').onSnapshot(snap => {
      pedidosCache = snap.docs.map(d => ({ docId: d.id, ...d.data() }));
      render();
    }, err => {
      console.error('Error Firebase:', err);
      document.getElementById('lista').innerHTML = '<div id="vacio"><span>⚠️</span>Error de conexión con Firebase. Revisa tu configuración.</div>';
    });
  } else {
    // Modo local: lee de este dispositivo y refresca cada 5s
    cargarLocal();
    intervaloLocal = setInterval(cargarLocal, 5000);
  }
}

function cargarLocal(){
  const arr = JSON.parse(localStorage.getItem('cochirosso_pedidos') || '[]');
  pedidosCache = arr.map(p => ({ docId: 'local_'+p.id, ...p })).sort((a,b)=>b.id-a.id);
  render();
}

async function cambiarEstado(docId, nuevoEstado){
  if(db && !docId.startsWith('local_')){
    try {
      await db.collection('pedidos').doc(docId).update({ estado: nuevoEstado });
      mostrarNotif('Estado actualizado ✓');
    } catch(e){ mostrarNotif('Error al actualizar'); }
  } else {
    const id = parseInt(docId.replace('local_',''));
    const arr = JSON.parse(localStorage.getItem('cochirosso_pedidos') || '[]');
    const p = arr.find(x => x.id === id);
    if(p){ p.estado = nuevoEstado; localStorage.setItem('cochirosso_pedidos', JSON.stringify(arr)); cargarLocal(); mostrarNotif('Estado actualizado ✓'); }
  }
}
window.cambiarEstado = cambiarEstado;

async function eliminar(docId){
  if(!confirm('¿Eliminar este pedido?')) return;
  if(db && !docId.startsWith('local_')){
    try {
      await db.collection('pedidos').doc(docId).delete();
      mostrarNotif('Pedido eliminado');
    } catch(e){ mostrarNotif('Error al eliminar'); }
  } else {
    const id = parseInt(docId.replace('local_',''));
    const arr = JSON.parse(localStorage.getItem('cochirosso_pedidos') || '[]').filter(x => x.id !== id);
    localStorage.setItem('cochirosso_pedidos', JSON.stringify(arr));
    cargarLocal();
    mostrarNotif('Pedido eliminado');
  }
}
window.eliminar = eliminar;

function filtrar(estado, btn){
  filtroActual = estado;
  document.querySelectorAll('.filtro-btn').forEach(b => b.classList.remove('activo'));
  btn.classList.add('activo');
  render();
}
window.filtrar = filtrar;

function estadoLabel(e){
  const map = {nuevo:'🔴 Nuevo', preparando:'🟠 Preparando', listo:'🟢 Listo', entregado:'⚪ Entregado'};
  return map[e] || e;
}

function render(){
  let pedidos = [...pedidosCache];
  const nuevos = pedidos.filter(p => p.estado === 'nuevo').length;
  const badge = document.getElementById('badge-nuevos');
  if(nuevos > 0){
    badge.style.display = 'inline';
    badge.textContent = nuevos + ' nuevo' + (nuevos > 1 ? 's' : '');
  } else {
    badge.style.display = 'none';
  }

  if(filtroActual !== 'todos'){
    pedidos = pedidos.filter(p => p.estado === filtroActual);
  }

  const lista = document.getElementById('lista');
  if(pedidos.length === 0){
    lista.innerHTML = '<div id="vacio"><span>🐷</span>No hay pedidos aquí todavía.</div>';
    return;
  }

  lista.innerHTML = pedidos.map(p => `
    <div class="pedido-card ${p.estado === 'nuevo' ? 'nuevo' : ''}">
      <div class="card-top">
        <div>
          <div class="pedido-id">#${p.id}</div>
          <div class="pedido-fecha">${p.fecha}</div>
        </div>
        <span class="estado-badge estado-${p.estado}">${estadoLabel(p.estado)}</span>
      </div>
      <ul class="items-list">
        ${p.items.map(i => `<li>• ${i.nombre} x${i.cantidad} — $${i.precio * i.cantidad}</li>`).join('')}
      </ul>
      ${p.nombre ? `<div style="font-size:12.5px;color:var(--text);font-weight:700;margin:4px 0">👤 ${p.nombre}</div>` : ''}
      ${p.celular ? `<div style="font-size:12.5px;color:var(--text);margin:4px 0">📱 <a href="tel:${p.celular}" style="color:var(--rojo);text-decoration:none">${p.celular}</a></div>` : ''}
      ${p.direccion ? `<div style="font-size:12.5px;color:var(--text);margin:4px 0">📍 ${p.direccion}</div>` : ''}
      ${p.zona ? `<div style="font-size:12.5px;color:var(--rojo);font-weight:700;margin:4px 0">🛵 Zona: ${p.zona}</div>` : ''}
      <div class="totales">
        <span>Subtotal: <strong>$${p.subtotal}</strong></span>
        <span>Envío: <strong>$${p.envio}</strong></span>
        <span>Total: <strong>$${p.total}</strong></span>
      </div>
      <div class="acciones">
        ${p.estado !== 'preparando' && p.estado !== 'listo' && p.estado !== 'entregado' ? `<button class="accion-btn btn-preparando" onclick="cambiarEstado('${p.docId}','preparando')">🟠 Preparando</button>` : ''}
        ${p.estado !== 'listo' && p.estado !== 'entregado' ? `<button class="accion-btn btn-listo" onclick="cambiarEstado('${p.docId}','listo')">🟢 Listo</button>` : ''}
        ${p.estado !== 'entregado' ? `<button class="accion-btn btn-entregado" onclick="cambiarEstado('${p.docId}','entregado')">⚪ Entregado</button>` : ''}
        <button class="accion-btn btn-eliminar" onclick="eliminar('${p.docId}')">🗑 Eliminar</button>
      </div>
    </div>
  `).join('');
}
window.cerrarSesion = cerrarSesion;
</script>
</body>
</html>
