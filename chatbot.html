<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cochirosso · Tortas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --rojo:#9b1c1c;
  --rojo-t:rgba(155,28,28,0.13);
  --rojo-btn:rgba(155,28,28,0.85);
  --rojo-hover:rgba(155,28,28,1);
  --crema:#fdf6ef;
  --text:#1a1a1a;
  --muted:#666;
  --radius:14px;
}
body{background:var(--crema);color:var(--text);font-family:'Nunito',sans-serif;min-height:100dvh;display:flex;flex-direction:column;align-items:center}
header{width:100%;max-width:500px;padding:1.2rem 1rem 0.8rem;display:flex;align-items:center;gap:12px;border-bottom:2px solid var(--rojo-t)}
header img{width:48px;height:48px;border-radius:50%;object-fit:cover}
.brand h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;color:var(--rojo);letter-spacing:0.04em;line-height:1}
.brand p{font-size:11px;color:var(--muted);letter-spacing:0.06em;text-transform:uppercase}
#chat{flex:1;width:100%;max-width:500px;padding:1rem 1rem 0;display:flex;flex-direction:column;gap:0.75rem;overflow-y:auto;scrollbar-width:thin}
.msg{display:flex;flex-direction:column;max-width:88%;animation:pop 0.2s ease}
@keyframes pop{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.msg.bot{align-self:flex-start}
.msg.user{align-self:flex-end}
.bubble{padding:0.7rem 1rem;border-radius:var(--radius);font-size:14.5px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.bot .bubble{background:#fff;border:1.5px solid rgba(155,28,28,0.18);border-bottom-left-radius:4px}
.user .bubble{background:var(--rojo-btn);color:#fff;border-bottom-right-radius:4px}
.buttons-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px;max-width:400px}
.menu-btn{background:var(--rojo-t);border:1.5px solid var(--rojo-btn);color:var(--rojo);border-radius:20px;padding:6px 14px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all 0.18s;white-space:nowrap}
.menu-btn:hover{background:var(--rojo-hover);color:#fff}
.typing span{display:inline-block;width:7px;height:7px;background:var(--rojo);border-radius:50%;margin:0 2px;animation:bounce 1.1s infinite}
.typing span:nth-child(2){animation-delay:.18s}
.typing span:nth-child(3){animation-delay:.36s}
@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-6px)}}
#input-area{width:100%;max-width:500px;padding:0.75rem 1rem 1.2rem;display:flex;gap:8px;align-items:flex-end;border-top:2px solid var(--rojo-t)}
#msg-input{flex:1;border:1.5px solid rgba(155,28,28,0.25);border-radius:12px;padding:0.6rem 0.9rem;font-family:'Nunito',sans-serif;font-size:14px;background:#fff;outline:none;resize:none;min-height:42px;max-height:120px;line-height:1.5;transition:border .2s}
#msg-input:focus{border-color:var(--rojo)}
#send-btn{background:var(--rojo-btn);border:none;border-radius:10px;width:42px;height:42px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:opacity .2s,transform .1s}
#send-btn:hover{opacity:0.9}
#send-btn:active{transform:scale(0.95)}
#send-btn:disabled{opacity:0.3;cursor:not-allowed}
#send-btn svg{fill:#fff;width:18px;height:18px}
</style>
</head>

function detectarEnvio(direccion){
  const d = direccion.toLowerCase();
  if(ZONAS_60.some(z => d.includes(z))) return {costo:60, zona:'Las Villas / Senderos / Viñedos'};

}

function scroll(){ chat.scrollTop = chat.scrollHeight; }

function addBubble(role, text, buttons){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.textContent = text;
  wrap.appendChild(bub);
  if(buttons){
    const row = document.createElement('div');
    row.className = 'buttons-row';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'menu-btn';
      btn.textContent = b.label;
      btn.onclick = () => {
        row.querySelectorAll('.menu-btn').forEach(x=>x.disabled=true);
        handleUserInput(b.value);
      };
      row.appendChild(btn);
    });
    wrap.appendChild(row);
  }
  chat.appendChild(wrap);
  scroll();
  return bub;
}

}

function subtotalCarrito(){
  return carrito.reduce((s,i) => s + i.precio*i.cantidad, 0);
}

function resumenCarrito(conEnvio){
  if(carrito.length === 0) return 'Tu carrito está vacío.';
  let txt = '🛒 Tu pedido:\n';
  carrito.forEach(i => {
    txt += `  • ${i.nombre} x${i.cantidad} = $${i.precio * i.cantidad}\n`;
  });
  const sub = subtotalCarrito();
  txt += `\n💵 Subtotal: $${sub}`;
  if(conEnvio){
    txt += `\n🛵 Envío (${zonaActual}): $${envioActual}`;
    txt += `\n💰 Total: $${sub + envioActual}`;
  }
  return txt;
}

async function guardarPedido(){
  const sub = subtotalCarrito();
  const pedido = {
    id: Date.now(),
    fecha: new Date().toLocaleString('es-MX'),
    items: [...carrito],
    nombre: nombreActual,
    celular: celularActual,
    horario: horarioActual,
    pago: pagoActual,
    comprobante: comprobanteActual,
    direccion: direccionActual,
    zona: zonaActual,
    subtotal: sub,
    envio: envioActual,
    total: sub + envioActual,
    estado: 'nuevo'
  };
  // Si Firebase está configurado, guarda en la nube (visible en cualquier dispositivo)
  if(db){
    try {
      await db.collection('pedidos').add(pedido);
      return pedido;
    } catch(e){ console.error('Error Firebase, guardando local:', e); }
  }
  // Respaldo: guarda en este dispositivo
  const pedidos = JSON.parse(localStorage.getItem('cochirosso_pedidos') || '[]');
  pedidos.push(pedido);
  localStorage.setItem('cochirosso_pedidos', JSON.stringify(pedidos));
  return pedido;
}

function handleUserInput(texto){
  const txt = texto.toLowerCase().trim();

  if(esperandoComprobante){
    addBubble('user', texto);
    addBubble('bot', '📎 Por favor sube la foto de tu comprobante con el botón verde 📎 (abajo a la izquierda). Si prefieres, escribe "efectivo" para cambiar tu forma de pago.');
    if(txt.includes('efectivo')){
      esperandoComprobante = false;
      mostrarBotonSubir(false);
      comprobanteActual = '';
      preguntarPago();
    }
    return;
  }

  if(esperandoNombre){
    if(texto.trim().length < 2){
      addBubble('user', texto);
      addBubble('bot', 'Escribe tu nombre, por favor 🙂');
      return;
    }
    esperandoNombre = false;
    nombreActual = texto.trim();
    addBubble('user', texto);
    esperandoCelular = true;
    addBubble('bot', `Gracias, ${nombreActual}. 📱 Ahora escribe tu número de celular (10 dígitos) por si necesitamos contactarte.`);
    return;
  }

  if(esperandoCelular){
    const soloNumeros = texto.replace(/\D/g, '');
    if(soloNumeros.length < 10){
      addBubble('user', texto);
      addBubble('bot', 'El celular debe tener 10 dígitos. Escríbelo de nuevo, por favor 📱');
      return;
    }
    esperandoCelular = false;
    celularActual = soloNumeros;
    addBubble('user', texto);
    esperandoDireccion = true;
    addBubble('bot', '📍 Ahora escribe tu dirección completa (calle, número y colonia) para calcular el envío.');
    return;
  }

  if(esperandoDireccion){
    // El texto del cliente es su dirección
    if(texto.trim().length < 5){
      addBubble('user', texto);
      addBubble('bot', '📍 Escribe tu dirección un poco más completa, por favor (calle, número y colonia).');
      return;
    }
    esperandoDireccion = false;
    direccionActual = texto.trim();
    const env = detectarEnvio(direccionActual);
    envioActual = env.costo;
    zonaActual = env.zona;
    addBubble('user', texto);
    esperandoHorario = true;
    addBubble('bot', '⏰ ¿Para cuándo quieres tu pedido?', [
      {label:'🔥 ¡Ya! (lo antes posible)', value:'horario ya'},
      {label:'🕒 Programar una hora', value:'horario programar'}
    ]);
    return;
  }

  if(esperandoHorario){
    if(txt.includes('horario ya') || txt === 'ya' || txt.includes('lo antes')){
      esperandoHorario = false;
      horarioActual = 'Lo antes posible (¡Ya!)';
      addBubble('user', '¡Ya! Lo antes posible');
      preguntarPago();
      return;
    }
    if(txt.includes('horario programar') || txt.includes('programar')){
      esperandoHorario = false;
      esperandoHoraProgramada = true;
      addBubble('user', 'Programar una hora');
      addBubble('bot', '🕒 ¿A qué hora quieres tu pedido? Escríbela (ejemplo: 2:30 pm, 8 pm, 14:00).');
      return;
    }
    // Si escribió otra cosa, le repetimos las opciones
    addBubble('user', texto);
    addBubble('bot', 'Elige una opción, por favor 👇', [
      {label:'🔥 ¡Ya! (lo antes posible)', value:'horario ya'},
      {label:'🕒 Programar una hora', value:'horario programar'}
    ]);
    return;
  }

  if(esperandoHoraProgramada){
    if(texto.trim().length < 1){
      addBubble('user', texto);
      addBubble('bot', 'Escribe una hora válida, por favor (ejemplo: 3 pm).');
      return;
    }
    esperandoHoraProgramada = false;
    horarioActual = 'Programado: ' + texto.trim();
    addBubble('user', texto);
    preguntarPago();
    return;
  }

  if(esperandoPago){
    if(txt.includes('efectivo')){
      esperandoPago = false;
      pagoActual = 'Efectivo';
      esperandoBillete = true;
      addBubble('user', '💵 Efectivo');
      addBubble('bot', '💵 ¿Con qué billete vas a pagar? Así llevamos tu cambio listo.', [
        {label:'$200', value:'billete 200'},
        {label:'$500', value:'billete 500'},
        {label:'$1000', value:'billete 1000'},
        {label:'Pago exacto', value:'billete exacto'}
      ]);
      return;
    }
    if(txt.includes('línea') || txt.includes('linea') || txt.includes('transferencia') || txt.includes('en linea')){
      esperandoPago = false;
      pagoActual = 'Pago en línea (transferencia)';
      addBubble('user', '💳 Pago en línea');
      const totalPedido = subtotalCarrito() + envioActual;
      addBubble('bot', `💳 Para pagar en línea, transfiere $${totalPedido} a:\n\n${DATOS_PAGO}`);
      esperandoComprobante = true;
      mostrarBotonSubir(true);
      addBubble('bot', '📎 Cuando hagas tu transferencia, sube aquí la foto de tu comprobante con el botón verde 📎 (abajo a la izquierda) para confirmar tu pedido.');
      return;
    }
    addBubble('user', texto);
    addBubble('bot', 'Elige cómo vas a pagar 👇', [
      {label:'💵 Efectivo', value:'pago efectivo'},
      {label:'💳 Pago en línea', value:'pago en línea'}
    ]);
    return;
  }

  if(esperandoBillete){
    esperandoBillete = false;
    let billete = texto.trim();
    if(txt.includes('billete 200')) billete = 'Paga con $200';
    else if(txt.includes('billete 500')) billete = 'Paga con $500';
    else if(txt.includes('billete 1000')) billete = 'Paga con $1000';
    else if(txt.includes('billete exacto') || txt.includes('exacto')) billete = 'Pago exacto';
    pagoActual = 'Efectivo — ' + billete;
    addBubble('user', billete);
    mostrarConfirmacionFinal();
    return;
  }

  if(esperandoConfirmacion){
    esperandoConfirmacion = false;
    if(txt.includes('sí') || txt.includes('si') || txt === 'confirmar' || txt.includes('confirm')){
      addBubble('user', texto);
      addBubble('bot', '⏳ Enviando tu pedido...');
      guardarPedido().then(pedido => {
        carrito = [];
        addBubble('bot', `✅ ¡Pedido #${pedido.id} confirmado, ${pedido.nombre}! Nos ponemos a trabajar. Tu total fue $${pedido.total} (incluye $${pedido.envio} de envío a ${pedido.zona}). ¡Gracias por elegir Cochirosso! 🐷`);
        zonaActual = ''; envioActual = 0; direccionActual = ''; nombreActual = ''; celularActual = ''; horarioActual = ''; pagoActual = ''; comprobanteActual = '';
        setTimeout(() => addBubble('bot', '¿Deseas hacer otro pedido?', [{label:'📋 Ver menú de nuevo', value:'ver menú'}]), 1000);
      });
    } else {
      addBubble('user', texto);
      addBubble('bot', 'Ok, pedido cancelado. ¿Qué deseas hacer?', [
        {label:'📋 Ver menú', value:'ver menú'},
        {label:'🛒 Ver carrito', value:'ver pedido'}
      ]);
    }
    return;
  }

  if(esperandoCantidad){
    const producto = esperandoCantidad;
    esperandoCantidad = null;
    const cant = parseInt(txt);
    if(isNaN(cant) || cant < 1){
      addBubble('user', texto);
      addBubble('bot', 'Ingresa una cantidad válida (ej: 1, 2, 3...)');
      esperandoCantidad = producto;
      return;
    }
    addBubble('user', texto);
    const exist = carrito.find(i => i.nombre === producto.nombre);
    if(exist){ exist.cantidad += cant; }
    else { carrito.push({...producto, cantidad: cant}); }
    addBubble('bot', `✅ Agregado: ${producto.nombre} x${cant}\n\n${resumenCarrito(false)}`, [
      {label:'➕ Agregar más', value:'ver menú'},
      {label:'✅ Confirmar pedido', value:'confirmar pedido'}
    ]);
    return;
  }

  if(txt.includes('ver menú') || txt.includes('menu') || txt.includes('ver menu')){
    addBubble('user', texto);
    mostrarMenu();
    return;
  }

  if(txt.includes('ver pedido') || txt.includes('ver carrito') || txt.includes('mi pedido')){
    addBubble('user', texto);
    if(carrito.length === 0){
      addBubble('bot', 'Tu carrito está vacío. ¿Qué te gustaría pedir?', MENU.map(p=>({label:`${p.nombre} $${p.precio}`, value:`quiero ${p.nombre}`})));
    } else {
      addBubble('bot', resumenCarrito(false), [
        {label:'➕ Agregar más', value:'ver menú'},
        {label:'✅ Confirmar pedido', value:'confirmar pedido'}
      ]);
    }
    return;
  }

  if(txt.includes('confirmar pedido') || txt === 'confirmar'){
    addBubble('user', texto);
    if(carrito.length === 0){
      addBubble('bot', 'No tienes nada en tu carrito todavía 🙂');
      mostrarMenu();
      return;
    }
    pedirNombre();
    return;
  }

  const encontrado = MENU.find(p => txt.includes(p.nombre.toLowerCase()));
  if(encontrado){
    addBubble('user', texto);
    esperandoCantidad = encontrado;
    addBubble('bot', `¡Excelente elección! 🔥\n${encontrado.nombre} — ${encontrado.desc}\n$${encontrado.precio} c/u\n\n¿Cuántos quieres?`);
    return;
  }

  // Respuesta automática (sin IA)
  addBubble('user', texto);

  // Respuestas a preguntas comunes
  if(txt.includes('hola') || txt.includes('buenas') || txt.includes('buenos')){
    addBubble('bot', '¡Hola! 👋 Bienvenido a Cochirosso. ¿Listo para pedir?', [
      {label:'📋 Ver el menú', value:'ver menú'}
    ]);
    return;
  }
  if(txt.includes('envio') || txt.includes('envío') || txt.includes('domicilio')){
    addBubble('bot', `🛵 El costo de envío depende de tu zona:\n\n• $20 → Campestre, Torreón Jardín, Centro\n• $40 → Otras zonas\n• $60 → Las Villas, Senderos, Viñedos\n\nSe calcula al confirmar tu pedido.`, [
      {label:'📋 Ver el menú', value:'ver menú'}
    ]);
    return;
  }
  if(txt.includes('precio') || txt.includes('cuanto') || txt.includes('cuánto') || txt.includes('costo')){
    addBubble('bot', 'Aquí tienes todos nuestros precios 👇', null);
    mostrarMenu();
    return;
  }
  if(txt.includes('gracias')){
    addBubble('bot', '¡Con gusto! 🐷 Estamos para servirte.', [
      {label:'📋 Ver el menú', value:'ver menú'}
    ]);
    return;
  }

  // Respuesta por defecto
  addBubble('bot', 'Para hacer tu pedido, usa los botones del menú 👇', [
    {label:'📋 Ver el menú', value:'ver menú'},
    {label:'🛒 Ver mi pedido', value:'ver pedido'}
  ]);
}

const fileInput = document.getElementById('file-input');
const uploadBtn = document.getElementById('upload-btn');

function mostrarBotonSubir(mostrar){
  uploadBtn.style.display = mostrar ? 'flex' : 'none';
}

function addImageBubble(role, dataUrl){
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const bub = document.createElement('div');
  bub.className = 'bubble';
  bub.style.padding = '6px';
  const img = document.createElement('img');
  img.src = dataUrl;
  img.style.maxWidth = '180px';
  img.style.borderRadius = '8px';
  img.style.display = 'block';
  bub.appendChild(img);
  wrap.appendChild(bub);
  chat.appendChild(wrap);
  scroll();
}

uploadBtn.addEventListener('click', () => fileInput.click());

fileInput.addEventListener('change', () => {
  const file = fileInput.files[0];
  if(!file) return;
  if(!file.type.startsWith('image/')){
    addBubble('bot', 'Por favor sube una imagen (foto de tu comprobante).');
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => {
    // Reducir tamaño de la imagen para guardarla
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      const maxW = 700;
      const escala = Math.min(1, maxW / img.width);
      canvas.width = img.width * escala;
      canvas.height = img.height * escala;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      comprobanteActual = canvas.toDataURL('image/jpeg', 0.7);

      addImageBubble('user', comprobanteActual);
      esperandoComprobante = false;
      mostrarBotonSubir(false);
      fileInput.value = '';
      addBubble('bot', '✅ ¡Comprobante recibido! Gracias.');
      mostrarConfirmacionFinal();
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
});

sendBtn.addEventListener('click', () => {
  const txt = input.value.trim();
  if(!txt) return;
  input.value = '';
  input.style.height = 'auto';
  handleUserInput(txt);
});

input.addEventListener('keydown', e => {
  if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); sendBtn.click(); }
});
input.addEventListener('input', ()=>{
  input.style.height = 'auto';
  input.style.height = input.scrollHeight + 'px';
});

// Saludo inicial
setTimeout(()=>{
  addBubble('bot','¡Hola! 👋 Bienvenido a Cochirosso. Soy tu asistente para hacer tu pedido. ¿Cómo te puedo ayudar hoy?', [
    {label:'📋 Ver el menú', value:'ver menú'},
  ]);
}, 400);
</script>
